<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>实验数据展示</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: center; }
    .data-box { background: #f5f5f5; padding: 30px; border-radius: 10px; margin: 20px 0; }
    .highlight { font-size: 24px; color: #e63946; font-weight: bold; }
    .btn { padding: 12px 30px; font-size: 16px; cursor: pointer; background: #457b9d; color: white; border: none; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>实验数据汇总</h1>
  <div class="data-box">
    <p>📊 你的实验分组：<span id="group"></span></p>
    <p>⏱️ 商品主图区停留时长：<span id="tAd"></span> 秒</p>
    <p>⏱️ 用户评论区停留时长：<span id="tUgc"></span> 秒</p>
    <hr>
    <p>🔢 搜寻努力 M 值（T_ugc/(T_ad+T_ugc)）：<span class="highlight" id="mValue"></span></p>
  </div>

  <p>请把上方的 M 值 <span class="highlight" id="mValueCopy"></span> 填写到问卷中！</p>
  <button class="btn" onclick="copyMValue()">复制M值</button>
  <p style="margin-top: 20px;">
    <a href="https://www.wjx.cn" target="_blank" class="btn">点击进入问卷填写页面</a>
  </p>

  <script>
    // 页面加载时计算并展示所有数据
    window.onload = function() {
      const data = JSON.parse(localStorage.getItem('experimentData'));
      // 计算M值（避免除以0）
      const totalTime = data.tAd + data.tUgc;
      const mValue = totalTime === 0 ? 0 : (data.tUgc / totalTime).toFixed(4);

      // 填充页面数据
      document.getElementById('group').textContent = data.group;
      document.getElementById('tAd').textContent = data.tAd.toFixed(2);
      document.getElementById('tUgc').textContent = data.tUgc.toFixed(2);
      document.getElementById('mValue').textContent = mValue;
      document.getElementById('mValueCopy').textContent = mValue;

      // 控制台打印（方便你调试/记录）
      console.log('===== 实验数据 =====');
      console.log('分组：', data.group);
      console.log('主图时长：', data.tAd.toFixed(2), '秒');
      console.log('评论时长：', data.tUgc.toFixed(2), '秒');
      console.log('M值：', mValue);
      console.log('====================');
    };

    // 复制M值到剪贴板
    function copyMValue() {
      const mValue = document.getElementById('mValue').textContent;
      navigator.clipboard.writeText(mValue).then(() => {
        alert('M值已复制到剪贴板！');
      });
    }
  </script>
</body>
</html>
